<svg xmlns="http://www.w3.org/2000/svg" width="920" height="640" viewBox="0 0 920 640" role="img" aria-labelledby="title desc">
  <title id="title">DBYTEPAD program window</title>
  <desc id="desc">DBYTEPAD running as a plain native Win32 text editor.</desc>
  <rect width="920" height="640" fill="#d8d8d8"/>
  <rect x="1" y="1" width="918" height="638" fill="#f8f8f8" stroke="#111" stroke-width="2"/>
  <rect x="1" y="1" width="918" height="30" fill="#f1f1f1" stroke="#b0b0b0" stroke-width="1"/>
  <rect x="13" y="8" width="16" height="16" fill="#111"/>
  <rect x="16" y="11" width="10" height="10" fill="#f8f8f8"/>
  <rect x="20" y="14" width="6" height="6" fill="#111"/>
  <text x="36" y="21" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111">README.md - DBYTEPAD</text>
  <text x="817" y="21" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#111">—</text>
  <text x="858" y="21" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#111">□</text>
  <text x="895" y="21" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#111">×</text>
  <rect x="1" y="31" width="918" height="22" fill="#ffffff" stroke="#bdbdbd" stroke-width="1"/>
  <text x="8" y="47" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111">File</text>
  <text x="42" y="47" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111">Edit</text>
  <text x="78" y="47" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111">View</text>
  <text x="116" y="47" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111">Help</text>
  <rect x="1" y="54" width="918" height="558" fill="#ffffff"/>
  <g font-family="Consolas, Cascadia Mono, monospace" font-size="15" fill="#111">
    <text x="8" y="82"># DBYTEPAD</text>
    <text x="8" y="118">A small native Windows text editor built directly on Win32.</text>
    <text x="8" y="154">No Electron.</text>
    <text x="8" y="178">No webview.</text>
    <text x="8" y="202">No runtime bundle.</text>
    <text x="8" y="226">No telemetry.</text>
    <text x="8" y="262">DBYTEPAD is a file-truth editor. It opens text, tracks state, reports facts,</text>
    <text x="8" y="286">supports read-only inspection, and measures its own build size.</text>
    <text x="8" y="334">## Version</text>
    <text x="8" y="370">Current stable release: v1.0.2</text>
    <text x="8" y="418">## What it does</text>
    <text x="8" y="454">- Opens and saves text files.</text>
    <text x="8" y="478">- Opens files from the command line.</text>
    <text x="8" y="502">- Opens files in read-only mode for inspection.</text>
    <text x="8" y="526">- Tracks dirty state in the title and status line.</text>
    <text x="8" y="550">- Shows file facts and UTF-8 byte count.</text>
  </g>
  <rect x="895" y="80" width="12" height="470" fill="#f0f0f0" stroke="#c8c8c8"/>
  <rect x="896" y="90" width="10" height="260" fill="#9b9b9b"/>
  <rect x="1" y="612" width="918" height="27" fill="#f1f1f1" stroke="#c8c8c8" stroke-width="1"/>
  <text x="8" y="631" font-family="Consolas, Cascadia Mono, monospace" font-size="14" fill="#111">Ln 1, Col 1    Chars 2179    UTF-8 bytes 2179    saved</text>
</svg>
